name: Best Cars — CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Python / Django ──────────────────────────────────────
  lint-python:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: pip install flake8 -r server/requirements.txt
      - name: Run flake8
        run: |
          flake8 server/djangoapp/ server/djangoproj/ \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,djangoenv \
            --ignore=E501,W503

  django-checks:
    name: Django System Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Create .env
        run: |
          echo "DJANGO_SECRET_KEY=ci-test-secret-key-abc123" > djangoapp/.env
          echo "DJANGO_ENV=development" >> djangoapp/.env
          echo "backend_url=http://localhost:3030" >> djangoapp/.env
          echo "searchcars_url=http://localhost:3050/" >> djangoapp/.env
          echo "sentiment_analyzer_url=http://localhost:5050/" >> djangoapp/.env
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Django system check
        run: python manage.py check

  # ── Node.js Services ─────────────────────────────────────
  lint-node-dealer:
    name: Lint Node.js Dealer Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/database
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/database/package-lock.json
      - run: npm ci
      - name: Check syntax
        run: node --check app.js

  lint-node-inventory:
    name: Lint Node.js Inventory Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/carsInventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/carsInventory/package-lock.json
      - run: npm ci
      - name: Check syntax
        run: node --check app.js

  # ── React Frontend ────────────────────────────────────────
  lint-react:
    name: Lint React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Build (validates compilation)
        run: npm run build
        env:
          CI: false  # Treat warnings as warnings, not errors
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: server/frontend/build/
          retention-days: 7

  # ── Docker Build Verification ─────────────────────────────
  docker-verify:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [django-checks, lint-react]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create .env file
        run: |
          echo "DJANGO_SECRET_KEY=ci-test-secret-key" > server/djangoapp/.env
          echo "DJANGO_ENV=development" >> server/djangoapp/.env
          echo "backend_url=http://database-api:3030" >> server/djangoapp/.env
          echo "searchcars_url=http://carsinventory-api:3050/" >> server/djangoapp/.env
          echo "sentiment_analyzer_url=http://sentiment-analyzer:5050/" >> server/djangoapp/.env
      - name: Build all images
        run: |
          docker compose --profile dev build \
            --build-arg BUILDKIT_INLINE_CACHE=1
        working-directory: server
        env:
          DOCKER_BUILDKIT: 1

  # ── Summary ───────────────────────────────────────────────
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [lint-python, django-checks, lint-node-dealer, lint-node-inventory, lint-react]
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully!"
