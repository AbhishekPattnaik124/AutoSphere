# ============================================================
# Nginx API Gateway — Best Cars Dealership Platform
# Routes all traffic through a single public entry point.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Structured access log ────────────────────────────────
    log_format main escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream":"$upstream_addr",'
            '"trace_id":"$http_x_trace_id"'
        '}';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # ── Rate limiting zones ──────────────────────────────────
    # Global: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
    # Review submission: 10 req/min per IP
    limit_req_zone $binary_remote_addr zone=reviews:10m rate=10r/m;

    # ── Upstream services ────────────────────────────────────
    upstream django_backend {
        server django:8000;
        keepalive 32;
    }

    upstream dealer_service {
        server database-api:3030;
        keepalive 16;
    }

    upstream inventory_service {
        server carsinventory-api:3050;
        keepalive 16;
    }

    upstream sentiment_service {
        server sentiment-analyzer:5050;
        keepalive 8;
    }

    upstream recommend_service {
        server recommend-service:3070;
        keepalive 8;
    }

    # ── Main server block ────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 10M;

        # Propagate a trace ID to all upstreams
        set $trace_id $http_x_trace_id;
        if ($trace_id = "") {
            set $trace_id $request_id;
        }
        proxy_set_header X-Trace-Id $trace_id;
        add_header X-Trace-Id $trace_id always;

        # ── Security headers ─────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss:;" always;

        # ── Apply global rate limit ──────────────────────────
        limit_req zone=global burst=20 nodelay;
        limit_req_status 429;

        # ── /api/ → Django DRF ───────────────────────────────
        location /api/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ── /djangoapp/ → Django legacy views ───────────────
        location /djangoapp/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ── /admin/ → Django admin ───────────────────────────
        location /admin/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }

        # ── /dealers-api/ → Node Dealer Service ─────────────
        location /dealers-api/ {
            rewrite ^/dealers-api/(.*) /$1 break;
            proxy_pass http://dealer_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ── /cars-api/ → Node Inventory Service ─────────────
        location /cars-api/ {
            rewrite ^/cars-api/(.*) /$1 break;
            proxy_pass http://inventory_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ── /sentiment-api/ → Flask NLP Service ─────────────
        location /sentiment-api/ {
            rewrite ^/sentiment-api/(.*) /$1 break;
            proxy_pass http://sentiment_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;   # NLP can be slow on first run
        }

        # ── /recommend-api/ → AI Recommend Service ──────────
        location /recommend-api/ {
            rewrite ^/recommend-api/(.*) /$1 break;
            proxy_pass http://recommend_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Review submission rate limiting (stricter)
        location /djangoapp/add_review {
            limit_req zone=reviews burst=5 nodelay;
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }

        # ── WebSocket passthrough for Socket.IO ─────────────
        location /socket.io/ {
            proxy_pass http://dealer_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        # ── / and everything else → React SPA ───────────────
        location /static/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ── Error pages ──────────────────────────────────────
        error_page 429 /rate_limited.json;
        location = /rate_limited.json {
            internal;
            return 429 '{"error":"RATE_LIMIT_EXCEEDED","message":"Too many requests. Please slow down.","retryAfter":60}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /gateway_error.json;
        location = /gateway_error.json {
            internal;
            return 503 '{"error":"SERVICE_UNAVAILABLE","message":"A backend service is temporarily unavailable. Please try again shortly."}';
            add_header Content-Type application/json;
        }
    }
}
